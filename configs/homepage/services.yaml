---

# ════════════════════════════════════════════════════════════════
# Tab: Home
# ════════════════════════════════════════════════════════════════

# ── Top row ──────────────────────────────────────────────────────
- The Lab:
    - Opti:
        icon: sh-ubuntu
        href: http://100.77.136.106:61208
        description: OptiPlex 3070
        server: my-docker
        container: glances
        widget:
          type: glances
          url: http://100.77.136.106:61208
          version: 4
          metric: cpu
          mem: false

    - Opti Activity:
        icon: sh-ubuntu
        description: Top Processes
        widget:
          type: glances
          url: http://100.77.136.106:61208
          version: 4
          metric: process
          cpu: false
          memory: false

    - P360 Proxmox:
        icon: proxmox.png
        href: https://p360:8006
        description: Virtualization Lab Node


# ── Media (column) ───────────────────────────────────────────────
- Services:
  - Media:
      - Jellyfin:
          href: https://jellyfin.kai.coach
          description: Media Server
          icon: jellyfin.png
          siteMonitor: https://jellyfin.kai.coach
          widget:
            type: jellyfin
            url: https://jellyfin.kai.coach
            key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
            enableBlocks: true
            enableNowPlaying: true
            fields: ["movies", "series", "episodes"]

      - Immich:
          href: https://immich.kai.coach
          description: Photo Library
          icon: immich.png
          siteMonitor: https://immich.kai.coach
          widget:
            type: immich
            url: https://immich.kai.coach
            key: "{{HOMEPAGE_VAR_IMMICH_API_KEY}}"
            version: 2

  - Apps:
      - Vaultwarden:
          href: https://vault.kai.coach
          description: Password manager
          icon: vaultwarden.png
          siteMonitor: https://vault.kai.coach

      - Authelia:
          href: https://auth.kai.coach
          description: SSO/MFA
          icon: authelia.png
          siteMonitor: https://auth.kai.coach

      - n8n:
          href: https://n8n.kai.coach
          description: Workflow automation
          icon: n8n.png
          siteMonitor: https://n8n.kai.coach

  - Network & DNS:
      - Pi-hole:
          href: http://100.111.36.105/admin
          description: DNS filtering
          icon: pi-hole.png
          widget:
            type: pihole
            url: http://100.111.36.105
            version: 6
            key: "{{HOMEPAGE_VAR_PIHOLE_API_KEY}}"
            fields:
              - queries
              - blocked
              - blocked_percent

      - Caddy:
          href: https://jellyfin.kai.coach
          description: Reverse proxy entrypoint
          icon: caddy.png
          siteMonitor: https://jellyfin.kai.coach

      - Speedtest Tracker:
          icon: speedtest-tracker.png
          href: http://100.77.136.106:8082
          description: WAN Speed Monitor
          server: my-docker
          container: speedtest-tracker
          widget:
            type: speedtest
            url: http://100.77.136.106:8082
            version: 2
            key: "{{HOMEPAGE_VAR_SPEEDTEST_API_KEY}}"
            fields:
              - download
              - upload
              - ping

  - Monitoring:
      - Uptime Kuma:
          href: https://status.kai.coach
          description: Uptime and health checks
          icon: uptime-kuma.png
          siteMonitor: https://status.kai.coach

      - Grafana:
          href: https://grafana.kai.coach
          description: Centralized logging
          icon: grafana.png
          siteMonitor: https://grafana.kai.coach

- Arr Stack:
  - Discovery:
      - Sonarr:
          href: http://100.77.136.106:8989
          description: TV automation
          icon: sonarr.png
          server: my-docker
          container: sonarr
          widget:
            type: sonarr
            url: http://100.77.136.106:8989
            key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
            fields:
              - wanted
              - series
            highlight:
              wanted:
                numeric:
                  - level: danger
                    when: gt
                    value: 0

      - Radarr:
          href: http://100.77.136.106:7878
          description: Movie automation
          icon: radarr.png
          server: my-docker
          container: radarr
          widget:
            type: radarr
            url: http://100.77.136.106:7878
            key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
            fields:
              - wanted
              - missing
              - movies
            highlight:
              wanted:
                numeric:
                  - level: danger
                    when: gt
                    value: 0

      - qBittorrent:
          icon: qbittorrent.png
          href: http://100.77.136.106:8080
          description: qBittorrent + Gluetun
          server: my-docker
          container: qbittorrent
          widget:
            type: qbittorrent
            url: http://100.77.136.106:8080
            username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
            password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"
            enableLeechProgress: true
            enableLeechSize: true


# ── Calendar column (center) ──────────────────────────────────────
  - Calendar:
      - Calendar:
          description: 📅 Release Calendar
          icon: mdi-calendar
          widget:
            type: calendar
            view: monthly
            firstDayInWeek: sunday
            maxEvents: 10
            showTime: true
            timezone: America/New_York
            integrations:
              - type: sonarr
                service_group: Discovery
                service_name: Sonarr
                color: blue
              - type: radarr
                service_group: Discovery
                service_name: Radarr
                color: yellow


# ── Arr Right column ──────────────────────────────────────────────
  - Management:
      - Seerr:
          href: https://seerr.kai.coach
          description: Requests and approvals
          icon: overseerr.png
          server: my-docker
          container: seerr
          widget:
            type: seerr
            url: https://seerr.kai.coach
            key: "{{HOMEPAGE_VAR_SEERR_API_KEY}}"
            fields:
              - pending
              - approved
              - available
            highlight:
              pending:
                numeric:
                  - level: danger
                    when: gt
                    value: 0

      - Bazarr:
          href: http://100.77.136.106:6767
          description: Subtitle management
          icon: bazarr.png
          siteMonitor: http://100.77.136.106:6767

      - Prowlarr:
          href: http://100.77.136.106:9696
          description: Indexers
          icon: prowlarr.png
          siteMonitor: http://100.77.136.106:9696




