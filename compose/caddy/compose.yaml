services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped

    networks:
      - proxy

    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data:/data
      - ./config:/config

networks:
  proxy:
    external: true
