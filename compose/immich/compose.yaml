name: immich

services:
  immich-server:
    container_name: immich-server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ./config.yml:${IMMICH_CONFIG_FILE}:ro
      # Uncomment after initial setup if you want Intel iGPU transcoding
      - /dev/dri:/dev/dri
    networks:
      - default
      - proxy 
#    ports:
#      - "100.77.136.106:2283:2283"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: immich-machine-learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - model-cache:/cache
    networks:
      - default
    security_opt:
      - no-new-privileges:true

  redis:
    container_name: immich-redis
    image: docker.io/redis:7.4-alpine
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1
    networks:
      - default

  database:
    container_name: immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment this if the postgres data is on spinning rust instead of SSD
      DB_STORAGE_TYPE: 'HDD'
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}" || exit 1
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - default
    security_opt:
      - no-new-privileges:true

volumes:
  model-cache:

networks:
  proxy:
    external: true
